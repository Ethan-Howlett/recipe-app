name: Deploy to Proxmox Server

on:
    push:
        branches:
            - demo

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up SSH and deploy docker
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Create the .env file on the server if it doesn't exist
            echo "CLOUDFLARE_TUNNEL_TOKEN=${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}" > ./CS2450Project/.env

            # 2. Execute the deployment script with the triggering branch
            ./CS2450Project/scripts/deploy.sh ${{ github.ref_name }}
